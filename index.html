<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoKh - Test Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <h2 class="text-xl font-bold mb-4">បញ្ជីផលិតផល (Real-time)</h2>
    
    <div id="productGrid" class="grid grid-cols-2 gap-4">
        <p class="text-gray-500 italic">កំពុងរង់ចាំទិន្នន័យពី Firebase...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBezQ6VqgEpju9TpUzFB6xvgRkA71Z4YMk",
            authDomain: "depokh-3ed7c.firebaseapp.com",
            projectId: "depokh-3ed7c",
            storageBucket: "depokh-3ed7c.firebasestorage.app",
            messagingSenderId: "53266184310",
            appId: "1:53266184310:web:c15761eb1de22c68c00757"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ទាញទិន្នន័យពី Collection ឈ្មោះ "products"
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('productGrid');
            
            if (snapshot.empty) {
                grid.innerHTML = "<p>រកមិនឃើញទិន្នន័យក្នុង Collection 'products' ទេ។</p>";
                console.log("No data found in Firestore");
                return;
            }

            grid.innerHTML = ""; 
            snapshot.forEach((doc) => {
                const item = doc.data();
                console.log("Item found:", item); // សម្រាប់ឆែកក្នុង Console

                grid.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow">
                        <img src="${item.image}" class="h-32 w-full object-cover rounded-lg mb-2">
                        <h4 class="font-bold text-sm">${item.name}</h4>
                        <p class="text-blue-900">$${item.price}</p>
                    </div>
                `;
            });
        }, (error) => {
            // ប្រសិនបើមានបញ្ហា Rules វានឹងលោត Error នៅទីនេះ
            console.error("Firebase Error:", error.message);
            alert("Error: " + error.message);
        });
    </script>
</body>
</html>
