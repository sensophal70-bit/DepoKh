<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoKh - POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kantumruy Pro', sans-serif; background-color: #f1f5f9; }</style>
</head>
<body class="p-4 pb-20">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-blue-900 mb-6 italic text-center">DepoKh Sales</h1>

        <input type="text" id="searchInput" placeholder="🔍 ស្វែងរកទំនិញ..." class="w-full p-4 mb-6 rounded-3xl border-none shadow-lg outline-none focus:ring-2 focus:ring-blue-500">

        <div id="productList" class="grid grid-cols-1 gap-4">
            <p class="text-center text-gray-400 py-10">កំពុងទាញទិន្នន័យ...</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex justify-around shadow-2xl rounded-t-[2rem]">
        <a href="index.html" class="text-blue-900 font-bold">🏠 លក់ទំនិញ</a>
        <a href="admin.html" class="text-gray-400 font-bold">⚙️ គ្រប់គ្រង</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBezQ6VqgEpju9TpUzFB6xvgRkA71Z4YMk",
            authDomain: "depokh-3ed7c.firebaseapp.com",
            projectId: "depokh-3ed7c",
            storageBucket: "depokh-3ed7c.firebasestorage.app",
            messagingSenderId: "53266184310",
            appId: "1:53266184310:web:c15761eb1de22c68c00757"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [];

        onSnapshot(query(collection(db, "products"), orderBy("createdAt", "desc")), (snapshot) => {
            allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts(allProducts);
        });

        function renderProducts(data) {
            const listDiv = document.getElementById('productList');
            listDiv.innerHTML = data.map(item => `
                <div class="bg-white p-4 rounded-[2rem] shadow-sm flex items-center space-x-4 border border-white">
                    <img src="${item.image}" class="w-16 h-16 object-cover rounded-2xl bg-gray-50">
                    <div class="flex-1">
                        <h4 class="font-bold text-gray-800 text-sm">${item.name}</h4>
                        <p class="text-green-600 font-black">$${item.price}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">ស្តុក: ${item.stock}</p>
                    </div>
                    <button onclick="sellProduct('${item.id}')" class="bg-blue-900 text-white px-5 py-3 rounded-2xl font-bold active:scale-90 transition">លក់</button>
                </div>
            `).join('');
        }

        window.sellProduct = async (id) => {
            const p = allProducts.find(i => i.id === id);
            const qty = prompt(`លក់ ${p.name}\nបញ្ចូលចំនួន:`, "1");
            if (!qty || isNaN(qty) || parseInt(qty) <= 0) return;
            const sellQty = parseInt(qty);
            if (sellQty > p.stock) return alert("ស្តុកមិនគ្រាន់!");

            const customer = prompt("ឈ្មោះអតិថិជន:", "ភ្ញៀវទូទៅ");

            try {
                await addDoc(collection(db, "sales"), {
                    productId: id, name: p.name, qty: sellQty, customer: customer || "ភ្ញៀវទូទៅ",
                    cost: p.cost, price: p.price, totalSale: p.price * sellQty,
                    totalProfit: (p.price - p.cost) * sellQty, soldAt: serverTimestamp()
                });
                await updateDoc(doc(db, "products", id), { stock: p.stock - sellQty });
                alert("លក់បានជោគជ័យ!");
            } catch (e) { alert(e.message); }
        };

        document.getElementById('searchInput').onkeyup = (e) => {
            const term = e.target.value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(term)));
        };
    </script>
</body>
</html>
