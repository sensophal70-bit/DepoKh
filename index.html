<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoKh - ទំព័រដើម</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kantumruy Pro', sans-serif; }</style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50">
        <h1 class="text-center font-bold text-xl uppercase italic">DepoKh</h1>
    </header>

    <main class="p-4">
        <h3 class="font-bold mb-4 border-l-4 border-blue-900 pl-2 text-gray-800">ផលិតផលគ្រឿងសំណង់</h3>
        
        <div id="productGrid" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBezQ6VqgEpju9TpUzFB6xvgRkA71Z4YMk",
            authDomain: "depokh-3ed7c.firebaseapp.com",
            projectId: "depokh-3ed7c",
            storageBucket: "depokh-3ed7c.firebasestorage.app",
            messagingSenderId: "53266184310",
            appId: "1:53266184310:web:c15761eb1de22c68c00757"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ទាញទិន្នន័យ Real-time
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const item = doc.data();
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <img src="${item.image}" class="h-36 w-full object-cover">
                        <div class="p-3">
                            <h4 class="text-sm font-semibold text-gray-700">${item.name}</h4>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-blue-900 font-bold">$${item.price}</span>
                                <button class="bg-blue-900 text-white w-7 h-7 rounded-full text-xs">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
