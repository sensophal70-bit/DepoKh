<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoKh Admin - គ្រប់គ្រងទិន្នន័យ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kantumruy Pro', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl">
        <h2 class="text-xl font-bold mb-6 text-blue-900 italic">ADMIN DEPOKH</h2>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ជ្រើសរើសរូបភាពផលិតផល</label>
                <input type="file" id="fileInput" accept="image/*" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700">
            </div>

            <input type="text" id="pName" placeholder="ឈ្មោះផលិតផល" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="number" id="pPrice" placeholder="តម្លៃ ($)" class="w-full p-4 border rounded-2xl outline-none">

            <button onclick="uploadAndSave()" id="btnSave" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">
                រក្សាទុកទិន្នន័យ
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBezQ6VqgEpju9TpUzFB6xvgRkA71Z4YMk",
            authDomain: "depokh-3ed7c.firebaseapp.com",
            projectId: "depokh-3ed7c",
            storageBucket: "depokh-3ed7c.firebasestorage.app",
            messagingSenderId: "53266184310",
            appId: "1:53266184310:web:c15761eb1de22c68c00757"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.uploadAndSave = async function() {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const btn = document.getElementById('btnSave');

            if (!file || !name || !price) return alert("សូមបំពេញឱ្យគ្រប់!");

            btn.innerText = "កំពុងបង្ហោះ...";
            btn.disabled = true;

            try {
                // ១. បង្ហោះរូបទៅ Storage
                const storageRef = ref(storage, 'products/' + Date.now() + "_" + file.name);
                const snapshot = await uploadBytes(storageRef, file);
                const url = await getDownloadURL(snapshot.ref);

                // ២. រក្សាទុកក្នុង Firestore
                await addDoc(collection(db, "products"), {
                    name: name,
                    price: price,
                    image: url,
                    createdAt: serverTimestamp()
                });

                alert("ជោគជ័យ!");
                location.reload();
            } catch (e) { alert("Error: " + e.message); }
        }
    </script>
</body>
</html>
