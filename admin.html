<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DepoKh - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kantumruy Pro', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-[2.5rem] shadow-xl">
        <h1 class="text-xl font-bold text-blue-900 mb-6 text-center italic">Admin Panel</h1>

        <div class="space-y-4">
            <input type="file" id="fileInput" accept="image/*" class="w-full text-xs">

            <input type="text" id="pName" placeholder="ឈ្មោះផលិតផល" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
            
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="pPrice" placeholder="តម្លៃ ($)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
                <input type="number" id="pStock" placeholder="ចំនួនស្តុក" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none">
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 ml-2">ប្រភេទ</label>
                <div class="flex space-x-2">
                    <select id="pCategory" class="flex-1 p-4 bg-gray-50 border rounded-2xl text-sm">
                        <option value="">-- រើសប្រភេទ --</option>
                    </select>
                    <button type="button" id="btnAddCat" class="bg-blue-900 text-white px-4 rounded-2xl font-bold">+</button>
                </div>
            </div>

            <div class="p-4 bg-gray-50 rounded-3xl border border-gray-100 space-y-3">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-bold text-gray-400">អ្នកផ្គត់ផ្គង់</label>
                    <button type="button" id="btnAddSup" class="text-blue-900 text-[10px] font-bold">+ បន្ថែមថ្មី</button>
                </div>
                <select id="sSelect" class="w-full p-3 bg-white border rounded-xl text-sm">
                    <option value="">-- រើសអ្នកផ្គត់ផ្គង់ --</option>
                </select>
                <input type="tel" id="sPhone" placeholder="លេខទូរស័ព្ទ" readonly class="w-full p-3 bg-gray-100 border rounded-xl text-xs font-mono italic">
            </div>

            <button id="btnSave" class="w-full bg-blue-900 text-white p-5 rounded-3xl font-bold shadow-lg">រក្សាទុកផលិតផល</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBezQ6VqgEpju9TpUzFB6xvgRkA71Z4YMk",
            authDomain: "depokh-3ed7c.firebaseapp.com",
            projectId: "depokh-3ed7c",
            storageBucket: "depokh-3ed7c.firebasestorage.app",
            messagingSenderId: "53266184310",
            appId: "1:53266184310:web:c15761eb1de22c68c00757"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "34723d8c15e48e075329257c0e0478ff";

        // ១. ទាញ Category
        onSnapshot(collection(db, "categories"), (snap) => {
            const sel = document.getElementById('pCategory');
            sel.innerHTML = '<option value="">-- រើសប្រភេទ --</option>';
            snap.forEach(d => sel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);
        });

        // ២. ទាញ Supplier
        onSnapshot(collection(db, "suppliers"), (snap) => {
            const sel = document.getElementById('sSelect');
            sel.innerHTML = '<option value="">-- រើសអ្នកផ្គត់ផ្គង់ --</option>';
            snap.forEach(d => sel.innerHTML += `<option value="${d.data().name}" data-phone="${d.data().phone}">${d.data().name}</option>`);
        });

        // ៣. បន្ថែម Category (Click Event)
        document.getElementById('btnAddCat').addEventListener('click', async () => {
            const name = prompt("បញ្ចូលឈ្មោះប្រភេទថ្មី:");
            if (name) {
                try {
                    await addDoc(collection(db, "categories"), { name });
                    alert("បានបន្ថែមប្រភេទថ្មី!");
                } catch (e) { alert("Error: " + e.message); }
            }
        });

        // ៤. បន្ថែម Supplier (Click Event)
        document.getElementById('btnAddSup').addEventListener('click', async () => {
            const name = prompt("បញ្ចូលឈ្មោះក្រុមហ៊ុន:");
            const phone = prompt("បញ្ចូលលេខទូរស័ព្ទ:");
            if (name && phone) {
                try {
                    await addDoc(collection(db, "suppliers"), { name, phone });
                    alert("បានបន្ថែមអ្នកផ្គត់ផ្គង់ថ្មី!");
                } catch (e) { alert("Error: " + e.message); }
            }
        });

        // ៥. Update Phone អូតូ
        document.getElementById('sSelect').addEventListener('change', (e) => {
            const opt = e.target.options[e.target.selectedIndex];
            document.getElementById('sPhone').value = opt.getAttribute('data-phone') || "";
        });

        // ៦. រក្សាទុកផលិតផល
        document.getElementById('btnSave').addEventListener('click', async () => {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const btn = document.getElementById('btnSave');

            if (!file || !name || !price) return alert("សូមបំពេញឱ្យគ្រប់!");

            btn.disabled = true;
            btn.innerText = "កំពុងរក្សាទុក...";

            try {
                let fd = new FormData();
                fd.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                const img = await res.json();

                await addDoc(collection(db, "products"), {
                    name,
                    price: parseFloat(price),
                    stock: parseInt(document.getElementById('pStock').value) || 0,
                    category: document.getElementById('pCategory').value,
                    supplierName: document.getElementById('sSelect').value,
                    supplierPhone: document.getElementById('sPhone').value,
                    image: img.data.url,
                    createdAt: serverTimestamp()
                });

                alert("ជោគជ័យ!");
                location.reload();
            } catch (e) { alert(e.message); btn.disabled = false; }
        });
    </script>
</body>
</html>
