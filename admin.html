<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoKh Admin - Product Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kantumruy Pro', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-4 pb-20">

    <div class="max-w-md mx-auto">
        <div class="bg-white p-6 rounded-3xl shadow-lg mb-6 border border-gray-100">
            <h2 id="formTitle" class="text-xl font-bold text-blue-900 mb-6 italic">បន្ថែមផលិតផលថ្មី</h2>
            
            <input type="hidden" id="editId"> <div class="space-y-4">
                <div class="bg-blue-50 p-4 rounded-2xl border-2 border-dashed border-blue-200 text-center">
                    <input type="file" id="fileInput" accept="image/*" class="w-full text-xs font-semibold">
                </div>

                <input type="text" id="pName" placeholder="ឈ្មោះផលិតផល" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="number" id="pPrice" placeholder="តម្លៃ ($)" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">

                <div class="flex space-x-2">
                    <button onclick="saveData()" id="btnSave" class="flex-1 bg-blue-900 text-white p-4 rounded-2xl font-bold active:scale-95 transition">រក្សាទុក</button>
                    <button onclick="resetForm()" id="btnCancel" class="hidden bg-gray-400 text-white px-6 rounded-2xl font-bold italic">បោះបង់</button>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="🔍 ស្វែងរកឈ្មោះផលិតផល..." class="w-full p-4 rounded-2xl border-none shadow-sm outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div id="productList" class="space-y-3">
            <p class="text-center text-gray-400 py-10 italic">កំពុងទាញទិន្នន័យ...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBezQ6VqgEpju9TpUzFB6xvgRkA71Z4YMk",
            authDomain: "depokh-3ed7c.firebaseapp.com",
            projectId: "depokh-3ed7c",
            storageBucket: "depokh-3ed7c.firebasestorage.app",
            messagingSenderId: "53266184310",
            appId: "1:53266184310:web:c15761eb1de22c68c00757"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "34723d8c15e48e075329257c0e0478ff";

        let allProducts = [];

        // ១. បង្ហាញបញ្ជី (Read)
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderProducts(allProducts);
        });

        function renderProducts(data) {
            const listDiv = document.getElementById('productList');
            listDiv.innerHTML = "";
            data.forEach(item => {
                listDiv.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center justify-between border border-gray-50">
                        <div class="flex items-center space-x-3">
                            <img src="${item.image}" class="w-12 h-12 object-cover rounded-xl bg-gray-100">
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${item.name}</h4>
                                <p class="text-blue-900 font-bold text-xs">$${item.price}</p>
                            </div>
                        </div>
                        <div class="flex space-x-1">
                            <button onclick="selectToEdit('${item.id}')" class="p-2 text-blue-600 bg-blue-50 rounded-full">✎</button>
                            <button onclick="deleteData('${item.id}')" class="p-2 text-red-600 bg-red-50 rounded-full">✕</button>
                        </div>
                    </div>
                `;
            });
        }

        // ២. ស្វែងរក (Search)
        window.searchProduct = function() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        // ៣. រក្សាទុក ឬ កែប្រែ (Add & Update)
        window.saveData = async function() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('btnSave');

            if (!name || !price) return alert("បំពេញព័ត៌មាន!");

            btn.disabled = true;
            btn.innerText = "កំពុងដំណើរការ...";

            try {
                let imageUrl = "";
                // បើមានរើសរូបភាពថ្មី ទើបបង្ហោះទៅ ImgBB
                if (file) {
                    let formData = new FormData();
                    formData.append("image", file);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const resData = await res.json();
                    imageUrl = resData.data.url;
                }

                if (id) {
                    // Update
                    const updateObj = { name, price: parseFloat(price) };
                    if (imageUrl) updateObj.image = imageUrl;
                    await updateDoc(doc(db, "products", id), updateObj);
                } else {
                    // Add New
                    if (!file) throw new Error("សូមរើសរូបភាព!");
                    await addDoc(collection(db, "products"), { name, price: parseFloat(price), image: imageUrl, createdAt: serverTimestamp() });
                }
                resetForm();
            } catch (e) { alert(e.message); }
            btn.disabled = false;
            btn.innerText = "រក្សាទុក";
        }

        // ៤. ជ្រើសរើសដើម្បីកែ (Select & Edit)
        window.selectToEdit = function(id) {
            const item = allProducts.find(p => p.id === id);
            document.getElementById('editId').value = item.id;
            document.getElementById('pName').value = item.name;
            document.getElementById('pPrice').value = item.price;
            document.getElementById('formTitle').innerText = "កែប្រែផលិតផល";
            document.getElementById('btnSave').innerText = "ធ្វើបច្ចុប្បន្នភាព";
            document.getElementById('btnCancel').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ៥. លុប (Delete)
        window.deleteData = async function(id) {
            if (confirm("ចង់លុបទិន្នន័យនេះ?")) await deleteDoc(doc(db, "products", id));
        }

        window.resetForm = function() {
            document.getElementById('editId').value = "";
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('fileInput').value = "";
            document.getElementById('formTitle').innerText = "បន្ថែមផលិតផលថ្មី";
            document.getElementById('btnSave').innerText = "រក្សាទុក";
            document.getElementById('btnCancel').classList.add('hidden');
        }
    </script>
</body>
</html>
