<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepoKh Admin - បញ្ចូលទំនិញ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kantumruy Pro', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-5 pb-20">

    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-200">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-blue-900 italic">ADMIN DEPOKH</h2>
            <span class="bg-blue-100 text-blue-800 text-[10px] px-2 py-1 rounded-full uppercase font-bold">Manager Mode</span>
        </div>

        <div class="space-y-5">
            <div class="bg-gray-50 p-4 rounded-2xl border-2 border-dashed border-gray-200 text-center">
                <label class="block text-sm font-medium text-gray-600 mb-2">រូបភាពផលិតផល (ពីទូរស័ព្ទ)</label>
                <input type="file" id="fileInput" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-900 file:text-white hover:file:bg-blue-800">
            </div>

            <div>
                <label class="block text-xs text-gray-400 mb-1 ml-2">ឈ្មោះផលិតផល</label>
                <input type="text" id="pName" placeholder="ឧទាហរណ៍៖ ស៊ីម៉ងត៍ កញ្ចក់" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-xs text-gray-400 mb-1 ml-2">តម្លៃ ($)</label>
                <input type="number" id="pPrice" placeholder="0.00" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <button onclick="uploadAndSave()" id="btnSave" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition disabled:bg-gray-400">
                <span id="btnText">រក្សាទុកទិន្នន័យ</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Firebase Config របស់អ្នក
        const firebaseConfig = {
            apiKey: "AIzaSyBezQ6VqgEpju9TpUzFB6xvgRkA71Z4YMk",
            authDomain: "depokh-3ed7c.firebaseapp.com",
            projectId: "depokh-3ed7c",
            storageBucket: "depokh-3ed7c.firebasestorage.app",
            messagingSenderId: "53266184310",
            appId: "1:53266184310:web:c15761eb1de22c68c00757"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.uploadAndSave = async function() {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const btn = document.getElementById('btnSave');
            const btnText = document.getElementById('btnText');

            if (!file || !name || !price) {
                alert("សូមមេត្តាបំពេញព័ត៌មានឱ្យគ្រប់ និងរើសរូបភាពផលិតផល!");
                return;
            }

            // ប្តូរស្ថានភាពប៊ូតុង
            btn.disabled = true;
            btnText.innerText = "កំពុងបង្ហោះរូបភាព...";

            try {
                // ១. បង្ហោះរូបភាពទៅ Firebase Storage
                const storageRef = ref(storage, 'products/' + Date.now() + "_" + file.name);
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);

                // ២. រក្សាទុកទិន្នន័យចូល Firestore ក្នុង Collection "products"
                btnText.innerText = "កំពុងរក្សាទុកក្នុង Database...";
                await addDoc(collection(db, "products"), {
                    name: name,
                    price: parseFloat(price),
                    image: downloadURL,
                    createdAt: serverTimestamp()
                });

                alert("ផលិតផលត្រូវបានបង្ហោះជោគជ័យ!");
                location.reload();

            } catch (e) {
                console.error("Error: ", e);
                alert("មានបញ្ហា៖ " + e.message);
            } finally {
                btn.disabled = false;
                btnText.innerText = "រក្សាទុកទិន្នន័យ";
            }
        }
    </script>
</body>
</html>
