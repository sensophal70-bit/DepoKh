<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DepoKh - Upload from Phone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kantumruy Pro', sans-serif; }</style>
</head>
<body class="bg-gray-100 p-5 pb-20">

    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
        <h2 class="text-xl font-bold text-blue-900 italic mb-6 text-center">ADMIN DEPOKH</h2>

        <div class="space-y-4">
            <div class="bg-blue-50 p-6 rounded-2xl border-2 border-dashed border-blue-200 text-center">
                <label class="block text-sm font-bold text-blue-900 mb-2">ថតរូប ឬរើសរូបផលិតផល</label>
                <input type="file" id="fileInput" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-900 file:text-white font-semibold cursor-pointer">
            </div>

            <input type="text" id="pName" placeholder="ឈ្មោះផលិតផល (ឧ៖ ស៊ីម៉ងត៍)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
            
            <input type="number" id="pPrice" placeholder="តម្លៃ ($)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">

            <button onclick="uploadAndSave()" id="btnSave" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition disabled:bg-gray-400">
                រក្សាទុកទិន្នន័យ
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config របស់អ្នក
        const firebaseConfig = {
            apiKey: "AIzaSyBezQ6VqgEpju9TpUzFB6xvgRkA71Z4YMk",
            authDomain: "depokh-3ed7c.firebaseapp.com",
            projectId: "depokh-3ed7c",
            storageBucket: "depokh-3ed7c.firebasestorage.app",
            messagingSenderId: "53266184310",
            appId: "1:53266184310:web:c15761eb1de22c68c00757"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ImgBB API Key របស់អ្នក
        const IMGBB_API_KEY = "34723d8c15e48e075329257c0e0478ff"; 

        window.uploadAndSave = async function() {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const btn = document.getElementById('btnSave');

            if (!file || !name || !price) {
                alert("សូមបំពេញព័ត៌មានឱ្យគ្រប់ និងរើសរូបភាព!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "កំពុងបង្ហោះរូបភាព...";

            try {
                // ១. បង្ហោះរូបភាពទៅកាន់ ImgBB
                let formData = new FormData();
                formData.append("image", file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("ការបង្ហោះរូបភាពបរាជ័យ!");

                const result = await response.json();
                const imageUrl = result.data.url; // ទទួលបាន Link រូបភាពពី ImgBB

                // ២. រក្សាទុកក្នុង Firebase Firestore
                btn.innerText = "កំពុងរក្សាទុកក្នុង Database...";
                await addDoc(collection(db, "products"), {
                    name: name,
                    price: parseFloat(price),
                    image: imageUrl,
                    createdAt: serverTimestamp()
                });

                alert("ផលិតផលត្រូវបានបញ្ចូលជោគជ័យ!");
                location.reload(); // Reset form

            } catch (e) {
                console.error(e);
                alert("មានបញ្ហា៖ " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "រក្សាទុកទិន្នន័យ";
            }
        }
    </script>
</body>
</html>
